    function getColour#uid#(temp=0, min=0, max=255){
      let black = ((max - min) / 2) + min;
      let step = black - min
      let r, b
      if(temp < black) {
        r = 0
        b = Math.round(255 - ((temp - min) * 255 / step))
        b = (b > 255) ? 255 : b
      }
      else if(temp > black) {
        r = Math.round((temp - black) * 255 / step)
        r = (r > 255) ? 255 : r
        b = 0
      }
      else return 'rgb(0,0,0)'
      
      return 'rgb('+r+',0,'+b+')'
    }

    jeedom.cmd.addUpdateFunction('#id#', function(_options) {
      if (is_object(cmd = document.querySelector('.cmd[data-cmd_uid="#uid#"]'))) {
        if (debug#uid# == 1) console.log('event for temperature[#id#] -> ' + _options.value)
        if (_options.value != undefined) 
        {
          let n = parseFloat(_options.value).toFixed(1), _int = n.split('.')[0], _dec = n.split('.')[1]

    jeedom.eqLogic.getCmd({

            })
            jeedom.cmd.addUpdateFunction(cmds[j].id, function(_options) {
              if (debug#uid# == 1) console.log('event for ' + name + '[' + id_eql + '] -> ' + _options.value)
              if (_options.value != undefined) 
              {
                let online = _options.value
                if ((online > config#uid#.rssi && subType == 'numeric') || (parseInt(online) > 0 && subType == 'binary')) {
                  document.getElementById("online-path-#uid#").setAttribute("d", "M7 17L17 7L12 2V22L17 17L7 7")
                  document.getElementById("online-#uid#").classList.remove("blink#uid#")
                }
                else 
                {
                  document.getElementById("online-path-#uid#").setAttribute("d", "M7 17L12 12M17 17L12 22V12M3 3L12 12M21 21L12 12M14.8252 9.1748L17 7L12 2V6.34961")
                  document.getElementById("online-#uid#").classList.add("blink#uid#")
                }
              }
            })
          }
          else {
            if (debug#uid# == 1) {
              if (genericType != null && genericType != 'null' && genericType != '') console.log('| ----------------> /!\\ le generique type [' + genericType + ']de la commande ' + name + '[' + id_eql + '] est inconnu')
            }
          }
        }
      }
    })
    if (debug#uid#) console.log('└──────────────────────────────────────────────────────')
    if (config#uid#.battery === false) document.getElementById("battery-#uid#").setAttribute("display", "none")
    if (config#uid#.online === false) document.getElementById("online-#uid#").setAttribute("display", "none")
    if (config#uid#.hum === false){
      document.getElementById("hum-#uid#").setAttribute("display", "none")
      document.getElementById("temp-int-#uid#").setAttribute("y", "58")
      document.getElementById("temp-dec-#uid#").setAttribute("y", "53.5")
      document.getElementById("temp-unit-#uid#").setAttribute("y", "50")
      document.getElementById("history-#uid#").setAttribute("y", "70")
      document.getElementById("tendance-#uid#").setAttribute("y", "64")
      document.getElementById("line-#uid#").classList.add('hide#uid#')
    }
    jeedom.cmd.refreshValue([{ cmd_id: '#id#', value: '#value#', display_value: '#state#', valueDate: '#valueDate#', collectDate: '#collectDate#', alertLevel: '#alertLevel#', unit: '#unite#' }])
  </script>
